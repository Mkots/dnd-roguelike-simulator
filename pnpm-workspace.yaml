# Reject packages published less than 7 days ago.
# Protects against supply chain attacks where a malicious version is published
# and pulled before the community notices.
minimumReleaseAge: 604800  # 7 days in seconds (pnpm parses this field as seconds, not ms)

# Packages excluded from the release-age check.
# These are intentionally pinned to an older major version (e.g. eslint 9.x while 10.x is out).
# Each entry must be reviewed and re-evaluated before the next major upgrade.
minimumReleaseAgeExclude:
  - eslint
  - "@eslint/js"
  - eslint-plugin-n
  - eslint-plugin-react-hooks
  - eslint-plugin-react-refresh
  - eslint-plugin-unicorn
  - typescript-eslint
  - typescript

allowBuilds:
  esbuild: true
  msw: true
